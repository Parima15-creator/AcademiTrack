<html>
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">

        <div class="logo-circle">
            <img src="Logo.png" alt="AcademiTrack Logo" class="Logo-img">
        </div>
        
        <div style="align-content:center ">
            <h1>AcademiTrack</h1>
            
        </div>
        
        <div class="card">
            <h2>Create Account</h2>
            <!--  tells the browser to send the collected data to a Java Servlet named SignupServlet-->
            <form action="SignupServlet" method="POST">
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <select name="department">
                        <option>Select Department</option>
                        <option value="Computer">Computer Engineering</option>
                        <option value="IT">Information Technology</option>
                        <option value="Mechanical">Mechanical Engineering</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn">Create Account</button>
            </form>
            
            <!-- Link to go back to the login page if they already have an account -->
            <p class="switch">Already have an account? <a href="index.html">Sign In</a></p>
        </div>

        <p class="copyright">© 2026 University Academic System. All rights reserved.</p>

    </div>
</body>
</html>
