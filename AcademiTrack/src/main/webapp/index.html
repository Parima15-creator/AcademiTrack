
<!DOCTYPE html>

<html>
<head>
    <title>Academic Performance Tracker - Login</title>
    <!-- Links the external CSS file to style the layout, fonts, and colors -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Header section containing the logo -->
        <div class="header">
            <div class="logo-circle">
                <img src="Logo.png" alt="AcademiTrack Logo" class="Logo-img">
            </div>        
        </div>
        
        <!-- Centered title of the application -->
        <div style="align-content:center ">
            <h1>AcademiTrack</h1>
        </div>
        
        <div class="card">
            <h2>Faculty Sign In</h2>
            
            <!-- Error Message: Hidden by default (display: none) -->
            <!-- It only shows up if the JavaScript at the bottom triggers it -->
            <p id="error-msg" style="color: #ff4d4d; font-weight: bold; margin-bottom: 15px; display: none;">
                Invalid Faculty Name or Password
            </p>
            
            <!-- The Form: Sends data to './LoginServlet' using the POST method -->
           <form action="./LoginServlet" method="POST">
                <div class="form-group">
                    <label>Faculty Name</label>
                    <!-- 'name' attribute is crucial; this is the key the server uses to find the data -->
                    <input type="text" name="facultyName" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <!-- Link to the registration page for new users -->
            <p class="switch">Don't have an account? <a href="signup.html">Create Account</a></p>
        </div>
        <p class="copyright">© 2026 University Academic System. All rights reserved.</p>
    </div>

    <script>
        // 1. Grab the parameters from the URL (e.g., login.html?error=true)
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. If the URL contains the word 'error', show the hidden error message paragraph
        if (urlParams.has('error')) {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
