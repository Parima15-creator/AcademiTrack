
<!DOCTYPE html>

<html>
<head>
    <title>Academic Performance Tracker - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="logo-circle">
                <img src="Logo.png" alt="AcademiTrack Logo" class="Logo-img">
            </div>        
        </div>
        
        <div style="align-content:center ">
            <h1>AcademiTrack</h1>
        </div>
        
        <div class="card">
            <h2>Faculty Sign In</h2>

            <p id="error-msg" style="color: #ff4d4d; font-weight: bold; margin-bottom: 15px; display: none;">
                Invalid Faculty Name or Password
            </p>

           <form action="./LoginServlet" method="POST">
                <div class="form-group">
                    <label>Faculty Name</label>
                    <input type="text" name="facultyName" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <p class="switch">Don't have an account? <a href="signup.html">Create Account</a></p>
        </div>
        <p class="copyright">© 2026 University Academic System. All rights reserved.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
